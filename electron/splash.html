<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>riff.quest</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: transparent;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
  }
  /* Transparent window: body padding leaves room for the card's drop shadow. */
  body { padding: 24px; }

  .card {
    position: relative;
    height: 100%;
    border-radius: 16px;
    overflow: hidden;
    background: #09090b;
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.06),
      0 24px 48px rgba(0, 0, 0, 0.55);
    -webkit-app-region: drag;
    animation: card-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Cyan halo — same vibe as the auth pages' top glow. */
  .glow {
    position: absolute;
    left: 50%;
    top: 0;
    width: 130%;
    height: 65%;
    transform: translate(-50%, -55%);
    background: radial-gradient(50% 50% at 50% 50%, rgba(34, 211, 238, 0.12), transparent 70%);
    filter: blur(36px);
    pointer-events: none;
  }

  .pattern {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.04;
    pointer-events: none;
  }

  .content {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }

  .logo {
    height: 62px;
    filter: drop-shadow(0 0 22px rgba(34, 211, 238, 0.18));
    animation:
      rise-in 0.6s 0.05s cubic-bezier(0.16, 1, 0.3, 1) both,
      breathe 3.2s 0.8s ease-in-out infinite;
  }

  .wordmark {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.03em;
    color: #e4e4e7;
    animation: rise-in 0.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .wordmark span { color: #22d3ee; }

  .eq {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 18px;
    margin-top: 2px;
    animation: rise-in 0.6s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .eq i {
    width: 4px;
    height: 100%;
    border-radius: 2px;
    background: #22d3ee;
    transform-origin: bottom;
    animation: eq ease-in-out infinite;
  }
  .eq i:nth-child(1) { animation-duration: 1.05s; animation-delay: -0.30s; opacity: 0.45; }
  .eq i:nth-child(2) { animation-duration: 0.85s; animation-delay: -0.65s; opacity: 0.75; }
  .eq i:nth-child(3) { animation-duration: 1.20s; animation-delay: -0.10s; opacity: 1;    }
  .eq i:nth-child(4) { animation-duration: 0.95s; animation-delay: -0.50s; opacity: 0.75; }
  .eq i:nth-child(5) { animation-duration: 1.10s; animation-delay: -0.85s; opacity: 0.45; }

  .status {
    font-size: 11px;
    color: #71717a;
    letter-spacing: 0.02em;
    text-align: center;
    max-width: 280px;
    animation: rise-in 0.6s 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes rise-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes breathe {
    50% { filter: drop-shadow(0 0 34px rgba(34, 211, 238, 0.32)); }
  }
  @keyframes eq {
    0%, 100% { transform: scaleY(0.25); }
    50%      { transform: scaleY(1); }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>

             fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 18.5c2 -2.5 4 -6.5 4 -10.5c0 -2.946 -2.084 -4.157 -4.204 -4.654c-.864 -.23 -2.13 -.346 -3.796 -.346c-1.667 0 -2.932 .115 -3.796 .346c-2.12 .497 -4.204 1.708 -4.204 4.654c0 3.312 2 8 4 10.5c.297 .37 .618 .731 .963 1.081l.354 .347a3.9 3.9 0 0 0 5.364 0a14.05 14.05 0 0 0 1.319 -1.428z"/>

          <!-- headphones -->
          <g transform="translate(110, 110) scale(1.333)"
             fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 14h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a9 9 0 0 1 18 0v7a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3"/>
          </g>
        </pattern>
      </defs>
      <rect x="0" y="0" width="100%" height="100%" fill="url(#splash-bg-pattern)" />
    </svg>

        <path d="M71.76,910.68c25.68,44.8,62.62,84.76,105.31,114.17,125.32,86.34,302.03,86.24,422.36-9.3,1.03-.69,2.09-.69,3.24-.37,1.77.5,23.27,22.59,26.23,25.85,28.49,31.29,52.78,68.42,72.76,105.28,5.98,11.04,13.9,24.99,18.57,36.38.57,1.38,1.95,3.77,1.91,5.46-.01.49-.29.94-.71,1.2-42.3,25.91-89.54,44.37-138.04,55.21-237.58,53.1-471.38-60.86-554.03-291.99-39.77-111.22-41.86-261.79,10.52-369.52,1.64-3.37,7.3-9.77,6.07-2.96-1.43,7.93-5.34,17.49-7.28,25.75-24.06,102.44-20.12,212.05,33.08,304.86Z"/>
      </svg>

      <div class="wordmark">riff<span>.</span>quest</div>

      <div class="eq" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>

      <div class="status" id="status">Uruchamianie aplikacji…</div>
    </div>
  </div>
  <script>
    window.splash.onStatus((text) => {
      const el = document.getElementById("status");
      if (el) el.textContent = text;
    });
  </script>
</body>
</html>
