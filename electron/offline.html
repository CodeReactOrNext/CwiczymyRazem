<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>riff.quest — offline</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #09090b;
    color: #e4e4e7;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    -webkit-user-select: none;
    user-select: none;
    overflow: hidden;
  }

  /* Frameless window: keep the top strip draggable like the app's title bar. */
  .dragbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 36px;
    -webkit-app-region: drag;
  }

  .glow {
    position: fixed;
    left: 50%;
    top: 0;
    width: 80vw;
    height: 60vh;
    transform: translate(-50%, -55%);
    background: radial-gradient(50% 50% at 50% 50%, rgba(34, 211, 238, 0.10), transparent 70%);
    filter: blur(60px);
    pointer-events: none;
  }

  .pattern {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.03;
    pointer-events: none;
  }

  .wrap {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    text-align: center;
    padding: 24px;
  }

  .logo {
    height: 58px;
    filter: drop-shadow(0 0 22px rgba(34, 211, 238, 0.15));
    animation: rise-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  h1 {
    margin: 6px 0 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #e4e4e7;
    animation: rise-in 0.6s 0.08s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  p {
    margin: 0;
    max-width: 360px;
    font-size: 13px;
    line-height: 1.6;
    color: #71717a;
    animation: rise-in 0.6s 0.16s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .dots {
    display: inline-block;
    width: 18px;
    text-align: left;
  }

  button {
    margin-top: 10px;
    appearance: none;
    border: 0;
    border-radius: 8px;
    background: #22d3ee;
    color: #083344;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 22px;
    cursor: pointer;
    transition: filter 0.15s ease;
    animation: rise-in 0.6s 0.24s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  button:hover { filter: brightness(1.1); }
  button:active { filter: brightness(0.95); }

  @keyframes rise-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="dragbar"></div>
  <div class="glow"></div>

    <h1>Brak połączenia</h1>
    <p>
      Nie można połączyć się z riff.quest. Sprawdź internet —
      połączymy się automatycznie<span class="dots" id="dots">…</span>
    </p>

    <button type="button" id="retry">Spróbuj teraz</button>
  </div>

  <script>
    document.getElementById("retry").addEventListener("click", () => {
      if (window.electronApp) window.electronApp.retryConnect();
    });
    // Gentle "…" pulse so the page feels alive while the shell retries.
    const dots = document.getElementById("dots");
    let n = 3;
    setInterval(() => {
      n = (n % 3) + 1;
      dots.textContent = "…".slice(0, 1).repeat(0) + ".".repeat(n);
    }, 600);
  </script>
</body>
</html>
