name: Claude — implement labeled issue

# When an issue is labeled `claude-code`, Claude reads the ticket,
# implements the change, and opens a PR against the `master` branch.
# Auth: subscription token (secret CLAUDE_CODE_OAUTH_TOKEN).

on:
  issues:
    types: [labeled]

# Don't run two jobs for the same issue at the same time.
concurrency:
  group: claude-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write # create branches and commits
  issues: write # comment on / close issues
  pull-requests: write # open the PR
  id-token: write # auth via the GitHub App (OIDC token exchange)
  actions: read # read CI results

jobs:
  implement:
    # Only react to the `claude-code` label (rename if you prefer another).
    if: github.event.label.name == 'claude-code'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master # base the work on master (PRs target master)
          fetch-depth: 0 # full history so branch/PR git operations are safe

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install deps up front so Claude can actually run lint/tests
      # (a fresh checkout has no node_modules).
      - name: Install dependencies
        run: npm ci --legacy-peer-deps # project requires this (React 19 vs testing-library@13 peer conflict)

      - name: Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          base_branch: master # official input: base new branches / the PR on master
          # TODO: temporary — reveals Claude's full transcript in the logs for
          # debugging. Remove once the PR flow is confirmed working.
          show_full_output: true
          prompt: |
            Implement GitHub issue #${{ github.event.issue.number }} in this repository.

            IMPORTANT — how to work:
            - You run in ONE non-interactive session. There is NO continuation and nothing will
              resume you, so complete the ENTIRE task yourself before ending your turn.
            - Do NOT delegate to sub-agents and do NOT "wait for" anything to report back.
              Explore and edit the code directly, in this session.
            - You are finished ONLY after `gh pr create` has printed a PR URL. If you stop before
              that (e.g. after just researching), the task has FAILED.

            Step 1 — Read the ticket:
              Run: gh issue view ${{ github.event.issue.number }}

            Step 2 — Save progress EARLY (so nothing is lost if the run is long or hits a limit):
              As soon as you have a first meaningful change on disk, create a branch, push it,
              and open a DRAFT pull request. Do this BEFORE finishing the whole task:
                git checkout -b claude/issue-${{ github.event.issue.number }}
                git add -A && git commit -m "wip: #${{ github.event.issue.number }}"
                git push -u origin claude/issue-${{ github.event.issue.number }}
                gh pr create --draft --base master --head claude/issue-${{ github.event.issue.number }} --title "<short title>" --body "Closes #${{ github.event.issue.number }} — <summary>"

            Step 3 — Implement the change:
              - Follow the conventions, commands and rules in CLAUDE.md
                (and docs/STYLEGUIDE.md for anything UI/styling).
              - Reuse existing components; keep the change scoped to what the ticket asks for.
              - Commit and `git push` as you go, so partial work always survives on the branch.

            Step 4 — Finish:
              - Run `npm run lint` and `npm test` and fix problems until both pass.
              - Push the final commit, then mark the PR ready: `gh pr ready`
              - The task is complete ONLY once a PR exists. Editing files without pushing is a FAILURE.

            If the ticket is genuinely too ambiguous or too large to implement safely, do NOT guess —
            instead run `gh issue comment ${{ github.event.issue.number }} --body "<what exactly is blocking you>"`
            and stop.
          # --model pins the model explicitly (swap to claude-opus-4-8 for harder tickets).
          # --max-turns is a safety ceiling; Claude stops when done, it won't always use all of them.
          # --dangerously-skip-permissions: no interactive prompts exist in CI, so Claude
          #   must be allowed to run its tools (Bash/gh/npm/git, file edits) without asking.
          #   Safe here: the runner is ephemeral and the job only triggers for admin-labeled issues.
          # --disallowedTools Task: block sub-agent delegation. In a one-shot CLI run, delegating
          #   makes Claude yield its turn ("I'll wait for the agent...") and finish without doing
          #   the work. Force it to explore and implement inline instead.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 200
            --dangerously-skip-permissions
            --disallowedTools "Task"
