name: Claude — odpowiedz na komentarz @claude

# Odpala się, gdy ktoś w komentarzu pod PR-em (albo w recenzji / komentarzu
# do diffa) wspomni "@claude". Claude czyta wątek i kontekst PR-a, robi to,
# o co poproszono (odpowiada, poprawia kod) i pushuje zmiany na ten sam
# branch co PR.
# Auth: subscription token (secret CLAUDE_CODE_OAUTH_TOKEN).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

# Nie odpalaj drugiego joba dla tego samego PR-a, jeśli poprzedni jeszcze pracuje.
concurrency:
  group: claude-pr-comment-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write # commit poprawek na branchu PR-a
  pull-requests: write # komentowanie / aktualizacja PR-a
  issues: write # komentarze pod PR-em też lecą przez Issue Comment API
  id-token: write # auth przez GitHub App (OIDC token exchange)
  actions: read # odczyt wyników CI (np. "dlaczego failuje test?")

jobs:
  claude:
    # issue_comment odpala się też pod zwykłymi issue (nie tylko PR-ami) —
    # github.event.issue.pull_request istnieje tylko wtedy, gdy komentarz
    # jest pod pull requestem, więc filtrujemy po tym polu.
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Żeby Claude mógł faktycznie odpalić lint/testy przy poprawkach.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps # projekt tego wymaga (React 19 vs testing-library@13 peer conflict)

      - name: Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Bez custom `prompt:` — w tym trybie ("tag mode") Claude sam czyta
          # komentarz, który go wywołał, oraz cały kontekst PR-a, po czym
          # odpowiada albo robi requestowaną zmianę na branchu tego PR-a.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 100
            --dangerously-skip-permissions
            --disallowedTools "Task"
            --system-prompt "Stosuj się do CLAUDE.md (i docs/STYLEGUIDE.md przy zmianach UI/stylu). Jeśli zmieniasz kod, uruchom npm run lint oraz npm test i napraw błędy przed zakończeniem."
